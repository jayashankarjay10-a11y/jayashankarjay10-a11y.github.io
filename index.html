<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- AdMob Crawler Verification -->
  <meta name="google-admob-crawler-verification" content="ca-pub-9374965654828079" />

  <title>Jay Bro | Official</title>
  <meta name="description" content="Jay Bro - Official Website" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: #0b0b0b;
      color: #f3f1ee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      padding-bottom: 50px;
    }

    /* Animated Background Glow */
    .glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(220, 60, 60, 0.08);
      filter: blur(120px);
      top: 20%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      text-align: center;
      padding: 4rem 1rem;
      position: relative;
      z-index: 1;
      max-width: 800px;
      width: 100%;
      animation: fadeUp 0.8s ease-out both;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 110px;
      height: 110px;
      border-radius: 24px;
      margin: 0 auto 2rem;
      border: 2px solid rgba(220, 60, 60, 0.3);
      box-shadow: 0 20px 60px rgba(220, 60, 60, 0.2);
      background: #000;
      overflow: hidden;
    }

    .logo img { width: 100%; height: 100%; object-fit: cover; }

    h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    h1 span { color: #dc3c3c; }

    .tagline { color: rgba(243, 241, 238, 0.5); font-size: 1rem; margin-bottom: 2rem; }

    /* Buttons */
    .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 3.5rem; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(220, 60, 60, 0.1);
      border: 1px solid rgba(220, 60, 60, 0.2);
      border-radius: 100px;
      padding: 12px 24px;
      color: #dc3c3c;
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .badge:hover { background: #dc3c3c; color: #fff; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(220, 60, 60, 0.2); }

    /* Apps Section */
    .section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; color: rgba(243, 241, 238, 0.3); margin-bottom: 25px; }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      margin-bottom: 4rem;
    }

    .app-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 25px 15px;
      border-radius: 24px;
      transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .app-card:hover { 
      background: rgba(220, 60, 60, 0.05); 
      border-color: rgba(220, 60, 60, 0.3);
      transform: scale(1.02);
    }
    
    .app-icon { 
      width: 56px; 
      height: 56px; 
      background: linear-gradient(135deg, #1a1a1a, #000); 
      border-radius: 14px; 
      margin: 0 auto 15px; 
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
    }

    /* Socials */
    .social-links { display: flex; justify-content: center; gap: 30px; margin-top: 2rem; }
    .social-links a { 
      color: rgba(243, 241, 238, 0.3); 
      text-decoration: none; 
      font-size: 0.8rem; 
      transition: 0.3s;
    }
    .social-links a:hover { color: #dc3c3c; }

    .footer-info { color: rgba(243, 241, 238, 0.15); font-size: 0.7rem; margin-top: 3rem; }
  </style>
</head>
<body>

  <div class="glow"></div>

  <div class="container">
    <div class="logo">
      <img src="https://z-cdn-media.chatglm.cn/files/09f1425e-3d51-4c53-b39d-4c5a5914506f.png?auth_key=1875575777-86bafcfb2df44fcb9392e607a9fe0c40-0-2c0c39aa113c2d575640b94f845566bd" alt="Jay Bro Logo" />
    </div>

    <h1>Jay <span>Bro</span></h1>
    <p class="tagline">Indie App & Game Developer</p>
    
    <div class="btn-group">
      <a href="https://play.google.com/store/apps/dev?id=7391490160011121447" class="badge" target="_blank">Google Play</a>
      <a href="#" onclick="copyEmail(event)" class="badge" id="contactBtn">Contact Me</a>
      <a href="#" class="badge">Join Community</a>
    </div>

    <div class="section-title">App List</div>
    <div class="apps-grid">
      <a href="#" class="app-card">
        <div class="app-icon">📱</div>
        <div style="font-weight: 600; font-size: 0.95rem; margin-bottom: 4px;">My Apps</div>
        <div style="font-size: 0.7rem; color: #777;">Published on Play Store</div>
      </a>
    </div>

    <div class="section-title">Game List</div>
    <div class="apps-grid">
      <a href="https://play.google.com/store/apps/details?id=com.wordtower.game" class="app-card" target="_blank">
        <div class="app-icon">
          <img src="https://play-lh.googleusercontent.com/gJu1uMbBQQTqCDx-4DEBKnAppLWTZz7Tbipk55n9w-Y4_HW1ob76bJsTnL6WPc8NnG4s0ENac3jnFnCscZdW7Q=w240-h480-rw" alt="Word Expert" />
        </div>
        <div style="font-weight: 600; font-size: 0.95rem; margin-bottom: 4px;">Word Expert</div>
        <div style="font-size: 0.7rem; color: #777;">Published on Play Store</div>
      </a>
    </div>

    <div class="social-links">
      <a href="#">Instagram</a>
      <a href="#">YouTube</a>
      <a href="#">GitHub</a>
    </div>

    <p class="footer-info">© 2026 Jay Bro. Developed with passion.</p>
  </div>

  <script>
    function copyEmail(e) {
      e.preventDefault();
      navigator.clipboard.writeText("jayashankar.jay10@gmail.com").then(() => {
        const btn = document.getElementById("contactBtn");
        btn.innerText = "Email Copied! ✅";
        setTimeout(() => btn.innerText = "Contact Me", 2500);
      });
    }
  </script>
</body>
</html>
